<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Layout</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    />
  
  <style>
    .header-top {
      background-color: #CDD0DC;
      height: 60px;
    }

    .header-nav {
      background-color: #7C8494;
      height: 90px;
    }

    .sidebar {
      background-color: #3B5999;
      min-height: 500px;
    }

    .main-content {
      background-color: #4A5470;
      min-height: 500px;
    }

    .footer-left {
      background-color: #3A0510;
      height: 60px;
    }

    .footer-right {
      background-color: #540A14;
      height: 60px;
    }
  </style>
</head>
<body>

  <!-- Top header bar  -->
  <div class="container-fluid">
    <div class="row">
      <div class="col-12 header-top"></div>
    </div>

    <!-- Navbar -->
    <div class="row">
      <div class="col-12 header-nav"></div>
    </div>

    <!-- Main content area -->
    <div class="row">
      <div class="col-4 sidebar"></div>
      <div class="col-8 main-content"></div>
    </div>

    <!-- Footer -->
    <div class="row">
      <div class="col-4 footer-left"></div>
      <div class="col-8 footer-right"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
