<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Urban Identity — Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montaga&family=Nothing+You+Could+Do&family=Orbitron:wght@400..900&family=Poller+One&display=swap" rel="stylesheet">

  <style>

    body {
      background-color: #000000;
      color: #ffffff;
      font-family: "Montaga", serif;
      margin: 0;
      padding: 0;
      align-items: center;
    }

    /* Navigation Bar */
    .navbar {
      background-color: #000000;
      border-bottom: 1px solid #333333;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-img {
      width: 80px;
    }

    .site-title {
      font-family: "Orbitron", sans-serif;
      font-size: 38px;
      font-weight: 600;
      letter-spacing: 1px;
      line-height: 1.3;
      color: #ffffff;
      text-align: center;
    }

    .site-subtitle {
      font-family: "Orbitron", sans-serif;
      font-size: 17px;
      letter-spacing: 2px;
      color: #cccccc;
      text-align: center;
    }

    .nav-links {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 40px;
    }

    .nav-links a {
      font-family: "Poller One", sans-serif;
      font-size: 12px;
      font-weight: 100;
      letter-spacing: 2px;
      color: #ffffff;
      text-decoration: none;
    }

    .nav-links a:hover {
      color: #aaaaaa;
    }

    /* Hero Image Section */
    .hero-section {
      text-align: center;
      padding: 24px 60px 0px 60px;
    }

    .hero-section img{
      width: 100%;
      max-width: 1000px;
      height: 729px;
      object-fit: cover;
    }

    .hero-text {
      font-size: 24px;
      color: #ffffff;
      line-height: 1.3;
      padding: 30px 20px;
      max-width: 680px;
      margin: 0 auto; 
      margin-bottom: 50px;
    }
        /* Photo Grid Section */
    .grid-section {
      padding: 0 40 40 40;
    }

    .grid-section img {
      width: 100%;
      max-height: 283px;
      object-fit: cover;
    }

    .center-img {
      display: block;
      margin: 0;
      width: 100%;
      height: 283px;
      object-fit: cover;
    }

    /* Footer */

    footer {
      border-top: 1px solid #333333;
      padding: 16px;
      text-align: center;
    }

    footer p {
      font-family: "Montaga", serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: #666666;
      margin: 0;
    }

    

  </style>
</head>

<body>

<!-- Navigation --> 
  <div class="navbar top">
   <img class="logo-img" src="images/logo.png" alt="Urban Identity Logo"/>
   <div>
    <div class="site-title">URBAN IDENTITY</div>
    <div class="site-subtitle">AN NYC PHOTOGRAPHY ARCHIVE</div>
  </div>

    <ul class="nav-links">
    <li><a href="index.html">HOME</a></li>
    <li><a href="galleries.html">GALLERIES</a></li>
    <li><a href="about.html">ABOUT</a></li>
    </ul>
  </div>

<!-- Hero Image / Description -->
  <div class="hero-section">
    <img src="images/hero-bridge.jpeg" alt="Queensborough Bridge NYC"/> 
    <p class="hero-text">
      Urban Identity is a curated photography archive exploring
      identity, belonging, and everyday life in New York City
      through multiple thematic collections. 
    </p>
  </div>

<!-- Photo Grid Section -->
  <div class="grid-section">

    <!-- Row 1 -->
    <div class="row g-3 mb-3">
      <div class="col-6">
        <img src="images/overthrow.jpeg" alt="Overthrow Boxing Club"/>
      </div>
      <div class="col-6">
        <img src="images/new-york.jpeg" alt="New York Graffiti"/>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="row g-3 mb-3">
      <div class="col-6">
        <img src="images/skyline.jpeg" alt="New York City Skyline Night"/>
      </div>
      <div class="col-6">
        <img src="images/pigeon.jpeg" alt="NYC Pigeon"/>
      </div>
    </div>

    <!-- One Centered Photo -->
    <div class="row">
      <div class="col-12 text-center">
        <img src="images/brooklyn-bridge.jpeg" alt="Brooklyn Bridge"/>
      </div>
    </div>
  </div>

<!-- Footer -->
  <footer>
    <p> Copyright @ 2026 Urban Identity </p>
  </footer>

</body>
</html>
